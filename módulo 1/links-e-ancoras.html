<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links e Âncoras</title>
</head>
<body>
    <h1>Links e Âncoras</h1>
    <p>Para criação de links e âncoras utilizamos a tag A, e seu atributo href cria a referência.</p>

    <h2>Link externo:</h2>
    <a href="https://github.com/JoaoJesus00" target="_blank" rel="external">Meu perfil no GitHub</a>
    <!--o target="_blank" abre o link em outra aba-->

    <h2>Link interno:</h2>
    <a href="imagens.html" rel="next" target="_self
    ">Esse link leva pra uma página dentro do meu própio site.</a>

    <h2>Link para download:</h2>
    <a href="uploads/revisao.pdf" download="revisao.pdf" type="application/pdf">Revisão de HTML CSS e JavaScript</a>
    
</body>
</html>
