<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Áudio e vídeo</title>
</head>
<body>
    <h1>Inserindo áudio</h1>
    <audio preload="metadata" controls>
        <source src="uploads/acontece.mp3" type="audio/mpeg">
    </audio>

    <h1>Inserindo vídeo em hospedagem própria</h1>
    <video src="uploads/dog.mp4" width="500" controls></video>

    <h1>Incorporando vídeos externos</h1>
    <iframe title="vimeo-player" src="https://player.vimeo.com/video/152471486?h=0d11ea644c" width="500" height="360" frameborder="0" referrerpolicy="strict-origin-when-cross-origin" allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share"   allowfullscreen></iframe>
</body>
</html>
